# dnsmasq configuration for Pocket Surf
# Provides DHCP and DNS services for the local network

# Interface to listen on
interface=wlan0

# Bind to the interface to make sure we aren't sending things elsewhere
bind-interfaces

# DHCP range
# Assigns IPs from 192.168.4.10 to 192.168.4.50 with 12-hour lease
dhcp-range=192.168.4.10,192.168.4.50,255.255.255.0,12h

# DNS server to use when not resolving local domains
# Uses Cloudflare DNS when internet is available
server=1.1.1.1
server=1.0.0.1

# Local domain
domain=local
local=/local/

# Never forward plain names (without a dot or domain part)
domain-needed

# Never forward addresses in the non-routed address spaces
bogus-priv

# DNS rewrites - map service names to the server IP
# The server itself runs on 192.168.4.1
address=/home.local/192.168.4.1
address=/files.local/192.168.4.1
address=/tasks.local/192.168.4.1
address=/wiki.local/192.168.4.1
address=/chat.local/192.168.4.1
address=/pocket.local/192.168.4.1

# Expand simple names
expand-hosts

# Set the cachesize
cache-size=1000

# Log queries for debugging (comment out in production)
# log-queries
# log-dhcp

# Don't read /etc/resolv.conf
no-resolv

# Don't poll /etc/resolv.conf for changes
no-poll
