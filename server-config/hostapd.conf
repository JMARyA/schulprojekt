# hostapd configuration for Pocket Surf WiFi Hotspot
# This creates a WiFi access point on the Raspberry Pi

# Interface to use for the AP
interface=wlan0

# Driver interface type
driver=nl80211

# SSID (Network Name)
ssid=PocketSurf

# Hardware mode: g = 2.4GHz
hw_mode=g

# Channel to use (1-11 for 2.4GHz)
channel=7

# Enable 802.11n
ieee80211n=1

# QoS support
wmm_enabled=1

# Country code (adjust for your location)
country_code=DE

# Authentication algorithm
auth_algs=1

# WPA/WPA2 security
wpa=2
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP

# WiFi password (change this!)
wpa_passphrase=PocketSurf2026

# Logging
logger_syslog=-1
logger_syslog_level=2
logger_stdout=-1
logger_stdout_level=2
